name: PR Size Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  size-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: pascalgn/size-label-action@v0.5.0
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          sizes: >
            {
              "0": "xs",
              "20": "s",
              "50": "m",
              "200": "l",
              "800": "xl",
              "2000": "xxl"
            }
