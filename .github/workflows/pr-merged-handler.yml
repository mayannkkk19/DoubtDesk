name: PR Merged Handler

on:
  pull_request_target:
    types: [closed]

permissions: {}

jobs:
  handle_merge:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    if: github.event.pull_request.merged == true
    steps:
      - name: Apply post-merge labels
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['gssoc:approved', 'mentor:knoxiboy', 'quality:clean']
            });
            
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            for (const label of labels) {
              if (label.name.startsWith('size/') || label.name === 'review-needed') {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    name: label.name
                  });
                  console.log(`Removed label ${label.name}`);
                } catch (e) {
                  console.log(`Failed to remove label ${label.name}`, e);
                }
              }
            }
