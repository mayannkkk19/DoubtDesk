name: Handle Duplicate/Invalid Issues

on:
  issues:
    types: [labeled]
  pull_request_target:
    types: [labeled]
  issue_comment:
    types: [created]

permissions: {}

jobs:
  handle_command:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '/duplicate #') && !github.event.issue.pull_request
    steps:
      - name: Handle duplicate via comment command

        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const commenter = context.payload.comment.user.login;
            try {
              const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: commenter
              });
              if (!['admin', 'write'].includes(permission.permission)) {
                console.log(`User ${commenter} is not a maintainer.`);
                return;
              }
            } catch (e) {
              return;
            }

            const body = context.payload.comment.body;
            const match = body.match(/\/duplicate\s+#(\d+)/);
            if (!match) return;
            const dupNumber = match[1];

            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['duplicate']
            });

            const message = `Hi there! Thanks for your contribution. However, this issue has been marked as a **duplicate** of #${dupNumber}. We are closing it to keep our tracker organized. Please search existing issues before opening new ones!`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_planned'
            });

  handle_label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    if: (github.event_name == 'issues' || github.event_name == 'pull_request_target') && (github.event.label.name == 'duplicate' || github.event.label.name == 'invalid')
    steps:
      - name: Handle invalid or duplicate via label

        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labelName = context.payload.label.name;
            const isIssue = context.eventName === 'issues';
            const typeStr = isIssue ? 'issue' : 'pull request';
            const number = isIssue ? context.issue.number : context.payload.pull_request.number;
            
            let message = '';
            
            if (labelName === 'duplicate') {
              message = `Hi there! Thanks for your contribution. However, this ${typeStr} has been marked as a **duplicate** of an existing one. We are closing it to keep our tracker organized.\n\n*(Maintainers: To explicitly state which issue this duplicates, use the command /duplicate #123 in a comment!)*`;
            } else if (labelName === 'invalid') {
              message = `Hi there! Thanks for reaching out. This ${typeStr} has been marked as **invalid**. This usually means it does not follow our contributing guidelines, is out of scope for the project, or lacks necessary information. It will now be closed.`;
            }

            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              labels: [labelName]
            });
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              body: message
            });
            
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              state: 'closed',
              state_reason: 'not_planned'
            });
